name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            rid: osx-arm64
          - os: windows-latest
            rid: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Build
        run: dotnet build src/MdView/MdView.csproj -c Release

      - name: Publish
        run: |
          dotnet publish src/MdView/MdView.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishTrimmed=true -p:TrimMode=link -o out
